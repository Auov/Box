name: Fork

on:
  workflow_dispatch:

jobs:
  Fork:
    runs-on: ubuntu-latest
    env:
      TZ: 'Asia/Shanghai'

    steps:
    # 检出你自己的仓库（带 GITHUB_TOKEN 授权）
    - name: Checkout target repository
      uses: actions/checkout@v5.0.0
      with:
        # 检出指定分支，这里是 X
        ref: X 
        token: ${{ secrets.GITHUB_TOKEN }}

    # 拉取 Qmxn/MiSub 仓库
    - name: Clone
      run: |
        repo_url="https://github.com/Qmxn/Box.git"

        # 克隆整个仓库
        git clone "$repo_url" tmpfile

        # 删除 tmpfile 里的 .github/workflows，避免覆盖自己仓库的 workflow
        rm -rf tmpfile/.github/workflows

        # 复制内容到当前仓库根目录（包含隐藏文件）
        cp -r tmpfile/* .
        cp -r tmpfile/.[^.]* . || true

        # 清理临时目录
        rm -rf tmpfile

    # 提交并推送更改
    - name: Add and Commit
      run: |
        if [[ -n $(git status -s) ]]; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto Update $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"

          # 确保远程地址带 GITHUB_TOKEN（避免 push 报错）
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # ⚠️【核心修改】直接强制推送到你的 X 分支，用新内容完全覆盖旧内容
          git push --force origin X
        else
          echo "No changes to commit."
        fi

    # 清理 workflow 运行历史
    - name: Cleanup Workflow
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
